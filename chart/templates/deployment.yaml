apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-sandbox.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-sandbox.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent-sandbox.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-sandbox.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "agent-sandbox.fullname" . }}
      containers:
        - name: api
          image: {{ .Values.image.api }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: {{ include "agent-sandbox.dbUrl" . | quote }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.baseURL | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model | quote }}
            - name: OPENCODE_IMAGE
              value: {{ .Values.opencode.image | quote }}
            - name: SANDBOX_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: SANDBOX_WARM_POOL
              value: {{ .Values.opencode.warmPool.name | quote }}
            - name: SANDBOX_READY_TIMEOUT
              value: {{ .Values.opencode.sandboxReadyTimeout | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/sessions
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/sessions
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
