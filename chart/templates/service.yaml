apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-sandbox.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-sandbox.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "agent-sandbox.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
