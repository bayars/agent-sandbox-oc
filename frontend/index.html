<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Sandbox</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
    header .badge {
      font-size: 11px;
      background: #1f6feb22;
      color: #58a6ff;
      border: 1px solid #1f6feb55;
      border-radius: 20px;
      padding: 2px 10px;
    }
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header span { font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .05em; }
    .btn-new {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-new:hover { background: #2ea043; }
    .btn-new:disabled { background: #3d4f3f; color: #8b949e; cursor: not-allowed; }
    .session-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .session-item {
      padding: 10px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: background .1s;
    }
    .session-item:hover { background: #1c2128; }
    .session-item.active { background: #1c2128; border-left-color: #58a6ff; }
    .session-item .sid {
      font-size: 13px;
      font-weight: 600;
      font-family: monospace;
      color: #e6edf3;
    }
    .session-item .smeta {
      font-size: 11px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot.ready { background: #3fb950; }
    .dot.creating { background: #f0883e; }
    .dot.error { background: #f85149; }
    .dot.deleted { background: #484f58; }
    .btn-del {
      margin-top: 4px;
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      align-self: flex-start;
    }
    .btn-del:hover { background: #f8514920; border-color: #f85149; color: #f85149; }

    /* ── Progress toast ── */
    .progress-pane {
      padding: 12px 14px;
      background: #0d1117;
      border-top: 1px solid #30363d;
      font-size: 12px;
      color: #8b949e;
      max-height: 120px;
      overflow-y: auto;
    }
    .progress-pane .prog-line { padding: 2px 0; display: flex; align-items: center; gap: 6px; }
    .progress-pane .prog-line .icon { font-size: 10px; }

    /* ── Chat panel ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0d1117;
    }
    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
      font-size: 13px;
      color: #8b949e;
    }
    .chat-header strong { color: #e6edf3; font-family: monospace; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg { display: flex; gap: 12px; max-width: 820px; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .msg.user .msg-avatar { background: #1f6feb; }
    .msg.assistant .msg-avatar { background: #238636; }
    .msg-bubble {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble { background: #1c3353; border-color: #1f6feb44; }
    .cursor { display: inline-block; width: 2px; height: 14px; background: #58a6ff; animation: blink .7s infinite; vertical-align: middle; margin-left: 2px; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #8b949e;
      gap: 8px;
    }
    .empty-state .icon { font-size: 40px; }
    .empty-state p { font-size: 14px; }
    .input-bar {
      padding: 16px 20px;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 10px;
      background: #161b22;
    }
    .input-bar textarea {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      font-family: inherit;
      line-height: 1.5;
      outline: none;
    }
    .input-bar textarea:focus { border-color: #58a6ff55; }
    .btn-send {
      background: #1f6feb;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 18px;
      width: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-send:hover:not(:disabled) { background: #388bfd; }
    .btn-send:disabled { background: #1f6feb44; cursor: not-allowed; }
    .error-msg { color: #f85149; font-size: 13px; padding: 8px 0; }

    /* ── Files panel ── */
    .files-panel {
      width: 300px;
      background: #161b22;
      border-left: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .files-header {
      padding: 10px 14px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .files-header .breadcrumb {
      font-size: 12px;
      color: #8b949e;
      font-family: monospace;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .files-header .breadcrumb span { cursor: pointer; color: #58a6ff; }
    .files-header .breadcrumb span:hover { text-decoration: underline; }
    .files-toolbar {
      display: flex;
      gap: 6px;
    }
    .btn-icon {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-icon:hover { background: #1c2128; color: #e6edf3; }
    .file-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
      color: #e6edf3;
    }
    .file-item:hover { background: #1c2128; }
    .file-item .file-icon { font-size: 13px; flex-shrink: 0; }
    .file-item .file-name { flex: 1; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .file-size { color: #484f58; font-size: 10px; flex-shrink: 0; }
    .files-empty { padding: 20px 14px; color: #484f58; font-size: 12px; text-align: center; }
    .files-loading { padding: 20px 14px; color: #8b949e; font-size: 12px; text-align: center; }
    .btn-toggle-files {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
      margin-left: auto;
    }
    .btn-toggle-files:hover { background: #1c2128; color: #e6edf3; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── SSE POST helper ──────────────────────────────────────────────────────────
async function* ssePost(url, body) {
  const res = await fetch(url, {
    method: "POST",
    headers: body ? { "Content-Type": "application/json" } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const parts = buf.split("\n\n");
    buf = parts.pop();
    for (const part of parts) {
      for (const line of part.split("\n")) {
        if (line.startsWith("data:")) {
          try { yield JSON.parse(line.slice(5).trim()); } catch {}
        }
      }
    }
  }
}

// ── StatusDot ────────────────────────────────────────────────────────────────
function StatusDot({ status }) {
  const cls = ["ready","creating","error","deleted"].includes(status) ? status : "creating";
  return <span className={`dot ${cls}`} />;
}

// ── SessionList ──────────────────────────────────────────────────────────────
function SessionList({ sessions, activeId, onSelect, onDelete, onNew, creating, progress }) {
  return (
    <div className="sidebar">
      <div className="sidebar-header">
        <span>Sessions</span>
        <button className="btn-new" onClick={onNew} disabled={creating}>
          {creating ? "…" : "+ New"}
        </button>
      </div>
      <div className="session-list">
        {sessions.length === 0 && !creating && (
          <div style={{ padding: "20px 14px", color: "#484f58", fontSize: 12 }}>
            No sessions yet. Click "+ New" to start.
          </div>
        )}
        {sessions.map(s => (
          <div
            key={s.id}
            className={`session-item ${s.id === activeId ? "active" : ""}`}
            onClick={() => onSelect(s.id)}
          >
            <div className="sid">{s.id}</div>
            <div className="smeta">
              <StatusDot status={s.status} />
              <span>{s.status}</span>
              {s.pod_phase && s.pod_phase !== "NotFound" && (
                <span>· {s.pod_phase}</span>
              )}
            </div>
            {s.id === activeId && (
              <button className="btn-del" onClick={e => { e.stopPropagation(); onDelete(s.id); }}>
                Delete
              </button>
            )}
          </div>
        ))}
      </div>
      {(creating || progress.length > 0) && (
        <div className="progress-pane">
          {progress.map((p, i) => (
            <div key={i} className="prog-line">
              <span className="icon">{p.type === "error" ? "✗" : p.type === "ready" ? "✓" : "›"}</span>
              <span>{p.msg || p.session_id && `Session ${p.session_id} ready!` || ""}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── ChatPanel ────────────────────────────────────────────────────────────────
function ChatPanel({ session, messages, onSend, streaming, showFiles, onToggleFiles }) {
  const endRef = useRef(null);
  const [input, setInput] = useState("");

  useEffect(() => {
    endRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      submit();
    }
  }

  function submit() {
    const text = input.trim();
    if (!text || streaming) return;
    onSend(text);
    setInput("");
  }

  if (!session) {
    return (
      <div className="chat-panel">
        <div className="empty-state">
          <div className="icon">🤖</div>
          <p>Select or create a session to start chatting.</p>
        </div>
      </div>
    );
  }

  return (
    <div className="chat-panel">
      <div className="chat-header" style={{ display: "flex", alignItems: "center" }}>
        <span>Storyteller Agent &nbsp;·&nbsp; session <strong>{session.id}</strong>
        &nbsp;·&nbsp; <StatusDot status={session.status} /> {session.status}</span>
        {onToggleFiles && (
          <button className="btn-toggle-files" onClick={onToggleFiles}>
            Files {showFiles ? "◨" : "◧"}
          </button>
        )}
      </div>
      <div className="messages">
        {messages.length === 0 && (
          <div className="empty-state" style={{ flex: "none", marginTop: 60 }}>
            <div className="icon">📖</div>
            <p>Ask the storyteller for a tale!</p>
          </div>
        )}
        {messages.map((m, i) => (
          <div key={i} className={`msg ${m.role}`}>
            <div className="msg-avatar">{m.role === "user" ? "U" : "AI"}</div>
            <div className="msg-bubble">
              {m.content}
              {m.streaming && <span className="cursor" />}
            </div>
          </div>
        ))}
        <div ref={endRef} />
      </div>
      <div className="input-bar">
        <textarea
          rows={2}
          placeholder="Tell me a story about…"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKey}
          disabled={streaming || session.status !== "ready"}
        />
        <button
          className="btn-send"
          onClick={submit}
          disabled={streaming || !input.trim() || session.status !== "ready"}
        >
          ➤
        </button>
      </div>
    </div>
  );
}

// ── FilesPanel ───────────────────────────────────────────────────────────────
function FilesPanel({ session, refreshKey }) {
  const [entries, setEntries] = useState([]);
  const [currentPath, setCurrentPath] = useState("");
  const [loading, setLoading] = useState(false);
  const uploadRef = useRef(null);

  function fmtSize(bytes) {
    if (bytes < 1024) return `${bytes}B`;
    if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)}K`;
    return `${(bytes / 1024 / 1024).toFixed(1)}M`;
  }

  async function fetchDir(path) {
    if (!session) return;
    setLoading(true);
    try {
      const r = await fetch(`/api/sessions/${session.id}/files${path ? "/" + path : ""}`);
      if (r.ok) {
        const data = await r.json();
        if (Array.isArray(data)) {
          setEntries(data);
          setCurrentPath(path);
        }
      }
    } catch {}
    setLoading(false);
  }

  useEffect(() => { if (session?.id) fetchDir(""); }, [session?.id]);
  useEffect(() => { if (session?.id && refreshKey > 0) fetchDir(currentPath); }, [refreshKey]);

  async function handleUpload(e) {
    const file = e.target.files[0];
    if (!file || !session) return;
    const fd = new FormData();
    fd.append("file", file);
    const dest = currentPath ? `${currentPath}/${file.name}` : file.name;
    try {
      await fetch(`/api/sessions/${session.id}/files/${dest}`, { method: "POST", body: fd });
      fetchDir(currentPath);
    } catch {}
    e.target.value = "";
  }

  function handleEntryClick(entry) {
    if (entry.type === "dir") {
      fetchDir(entry.path);
    } else {
      window.open(`/api/sessions/${session.id}/files/${entry.path}?download=true`, "_blank");
    }
  }

  // Breadcrumb: split currentPath into segments
  const segments = currentPath ? currentPath.split("/") : [];

  return (
    <div className="files-panel">
      <div className="files-header">
        <div className="breadcrumb">
          <span onClick={() => fetchDir("")}>/workspace</span>
          {segments.map((seg, i) => (
            <span key={i} onClick={() => fetchDir(segments.slice(0, i + 1).join("/"))}>
              /{seg}
            </span>
          ))}
        </div>
        <div className="files-toolbar">
          {currentPath && (
            <button className="btn-icon" onClick={() => {
              const up = currentPath.includes("/") ? currentPath.split("/").slice(0, -1).join("/") : "";
              fetchDir(up);
            }}>← up</button>
          )}
          <button className="btn-icon" onClick={() => fetchDir(currentPath)}>↻</button>
          <button className="btn-icon" onClick={() => uploadRef.current?.click()}>Upload</button>
        </div>
        <input ref={uploadRef} type="file" style={{ display: "none" }} onChange={handleUpload} />
      </div>
      <div className="file-list">
        {loading && <div className="files-loading">Loading…</div>}
        {!loading && entries.length === 0 && (
          <div className="files-empty">
            {session ? "Workspace is empty" : "No session selected"}
          </div>
        )}
        {!loading && entries.map((e, i) => (
          <div key={i} className="file-item" onClick={() => handleEntryClick(e)}>
            <span className="file-icon">{e.type === "dir" ? "📁" : "📄"}</span>
            <span className="file-name">{e.name}</span>
            {e.type === "file" && <span className="file-size">{fmtSize(e.size)}</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [sessions, setSessions] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [messagesBySession, setMessagesBySession] = useState({});
  const [streaming, setStreaming] = useState(false);
  const [creating, setCreating] = useState(false);
  const [progress, setProgress] = useState([]);
  const [showFiles, setShowFiles] = useState(true);
  const [fileRefreshKey, setFileRefreshKey] = useState(0);

  // Poll sessions list
  useEffect(() => {
    async function fetchSessions() {
      try {
        const r = await fetch("/api/sessions");
        if (r.ok) setSessions(await r.json());
      } catch {}
    }
    fetchSessions();
    const id = setInterval(fetchSessions, 5000);
    return () => clearInterval(id);
  }, []);

  async function createSession() {
    setCreating(true);
    setProgress([]);
    try {
      for await (const ev of ssePost("/api/sessions")) {
        setProgress(p => [...p, ev]);
        if (ev.type === "ready") {
          const newId = ev.session_id;
          // refresh list
          const r = await fetch("/api/sessions");
          if (r.ok) setSessions(await r.json());
          setActiveId(newId);
          setTimeout(() => setProgress([]), 3000);
        }
        if (ev.type === "done" || ev.type === "error") break;
      }
    } catch (e) {
      setProgress(p => [...p, { type: "error", msg: e.message }]);
    } finally {
      setCreating(false);
    }
  }

  async function deleteSession(id) {
    await fetch(`/api/sessions/${id}`, { method: "DELETE" });
    setSessions(s => s.filter(x => x.id !== id));
    if (activeId === id) setActiveId(null);
  }

  async function sendMessage(text) {
    if (!activeId || streaming) return;
    const userMsg = { role: "user", content: text };
    const aiMsg = { role: "assistant", content: "", streaming: true };

    setMessagesBySession(m => ({
      ...m,
      [activeId]: [...(m[activeId] || []), userMsg, aiMsg],
    }));
    setStreaming(true);

    try {
      for await (const ev of ssePost(`/api/sessions/${activeId}/chat`, { message: text })) {
        if (ev.type === "token") {
          setMessagesBySession(m => {
            const msgs = [...(m[activeId] || [])];
            const last = { ...msgs[msgs.length - 1] };
            last.content += ev.content;
            msgs[msgs.length - 1] = last;
            return { ...m, [activeId]: msgs };
          });
        }
        if (ev.type === "done") { setFileRefreshKey(k => k + 1); break; }
        if (ev.type === "error") break;
      }
    } catch {}

    // Remove streaming cursor from last message
    setMessagesBySession(m => {
      const msgs = [...(m[activeId] || [])];
      if (msgs.length > 0) {
        const last = { ...msgs[msgs.length - 1], streaming: false };
        msgs[msgs.length - 1] = last;
      }
      return { ...m, [activeId]: msgs };
    });
    setStreaming(false);
  }

  const activeSession = sessions.find(s => s.id === activeId) || null;
  const activeMessages = messagesBySession[activeId] || [];

  return (
    <>
      <header>
        <h1>Agent Sandbox</h1>
        <span className="badge">OpenCode · Storyteller</span>
      </header>
      <div className="layout">
        <SessionList
          sessions={sessions}
          activeId={activeId}
          onSelect={setActiveId}
          onDelete={deleteSession}
          onNew={createSession}
          creating={creating}
          progress={progress}
        />
        <ChatPanel
          session={activeSession}
          messages={activeMessages}
          onSend={sendMessage}
          streaming={streaming}
          showFiles={showFiles}
          onToggleFiles={() => setShowFiles(f => !f)}
        />
        {showFiles && activeSession && (
          <FilesPanel session={activeSession} refreshKey={fileRefreshKey} />
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
